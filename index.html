<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO (overridden per-page by react-helmet-async) -->
    <title>CampusCare — Student Mental Health &amp; Crowdfunding Platform</title>
    <meta name="description" content="CampusCare connects university students in Uganda with mental health resources, confidential counselling, and community crowdfunding. You're not alone in this journey." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="CampusCare" />
    <meta name="theme-color" content="#27ae60" />

    <!-- Open Graph base fallback -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CampusCare" />
    <meta property="og:image" content="https://campuscare.me/logo.png" />
    <meta property="og:locale" content="en_UG" />

    <!-- Canonical base -->
    <link rel="canonical" href="https://campuscare.me" />

    <!-- DNS prefetch / Preconnect for performance -->
    <link rel="dns-prefetch" href="https://campuscare-7jwj.onrender.com" />
    <link rel="preconnect" href="https://campuscare-7jwj.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- PWA / mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CampusCare" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Geo targeting -->
    <meta name="geo.region" content="UG" />
    <meta name="geo.placename" content="Mbarara, Uganda" />
    <meta name="language" content="English" />

    <meta name="google-site-verification" content="fKLy59145W_LQq-sXyVK3-rr7uNvXtu6-YkcpT7DchM" />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
